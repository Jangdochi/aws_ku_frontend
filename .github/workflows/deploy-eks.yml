name: Frontend → ArgoCD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build & Push
        env:
          ECR: ${{ secrets.ECR_FRONTEND_URI }}
          TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg REACT_APP_API_BASE_URL="" \
            -t $ECR:$TAG \
            -t $ECR:latest .
          docker push $ECR:$TAG
          docker push $ECR:latest

      - name: Checkout Infra Repository
        uses: actions/checkout@v3
        with:
          repository: Jangdochi/aws_ku_infra
          token: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
          path: infra-repo

      - name: Update Manifest
        run: |
          cd infra-repo
          sed -i "s|image:.*|image: ${{ secrets.ECR_FRONTEND_URI }}:${{ github.sha }}|g" manifests/frontend/frontend.yaml

      - name: Commit and Push Changes
        run: |
          cd infra-repo
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add manifests/frontend/frontend.yaml

          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: update frontend image to ${{ github.sha }} [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi